name: huit_student
description: Ứng dụng sinh viên HUIT - Phòng Đào Tạo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP Client
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.0.0

  # WebSocket
  stomp_dart_client: ^2.0.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # Connectivity
  connectivity_plus: ^5.0.2

  # UI Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  google_fonts: ^8.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
