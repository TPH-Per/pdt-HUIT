name: huit_student
description: Ứng dụng sinh viên HUIT - Phòng Đào Tạo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.4.3+1
  http: ^1.2.2

  # Storage
  shared_preferences: ^2.2.3

  # UI Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  google_fonts: ^6.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
