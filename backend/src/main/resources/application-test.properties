# Test Configuration for Testcontainers

spring.application.name=pdt-huit-test

# Testcontainers will override these
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///pdt_huit_test?TC_INITSCRIPT=classpath:db/migration_new/V1__init_pdt_huit.sql
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Flyway - disabled for tests (use TC_INITSCRIPT instead)
spring.flyway.enabled=false

# Redis - Testcontainers
spring.redis.host=localhost
spring.redis.port=6379

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=test-secret-key-for-testing-only-12345678
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Server
server.port=0

# Logging
logging.level.com.huit.pdt=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=INFO

# Actuator
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/internal/actuator
