# =============================================
# Application Configuration
# =============================================
spring.application.name=pdt-huit

# =============================================
# PostgreSQL Database Configuration
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/mydb?sslmode=disable&TimeZone=UTC
spring.datasource.username=per
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# Redis Configuration
# =============================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.database=0

# =============================================
# JPA/Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Disable open-in-view warning
spring.jpa.open-in-view=false

# =============================================
# Flyway Migration Configuration
# =============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration_new
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false

# =============================================
# Server Configuration
# =============================================
server.port=8081

# =============================================
# Nginx Proxy Configuration
# (Khi chạy sau Nginx reverse proxy)
# =============================================
# Trust forwarded headers từ Nginx
server.forward-headers-strategy=framework

# =============================================
# Timezone Configuration
# =============================================
spring.jackson.time-zone=UTC

# =============================================
# JWT Configuration
# =============================================
# Secret key (must be at least 256 bits = 32 characters)
jwt.secret=${JWT_SECRET:dev-insecure-secret-replace-before-prod!!1234}
# Token expiration time: 1 hour = 3600000 milliseconds
jwt.expiration=3600000
# Refresh token expiration: 7 days = 604800000 milliseconds
jwt.refresh-expiration=604800000

# =============================================
# Docker Compose Configuration
# =============================================
spring.docker.compose.enabled=false

# =============================================
# HikariCP Connection Pool
# =============================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================
# Hibernate Performance Tuning
# =============================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# Logging Configuration
# =============================================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=INFO
logging.level.com.huit.pdt=DEBUG
logging.file.name=logs/app.log

# =============================================
# Tomcat Thread Pool
# =============================================
server.tomcat.threads.max=150
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000

# =============================================
# Async Task Executor
# =============================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# =============================================
# Scheduled Task Executor
# =============================================
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=scheduled-task-

# =============================================
# Actuator (Health Check)
# =============================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.endpoints.web.base-path=/internal/actuator

# =============================================
# Compression
# =============================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
