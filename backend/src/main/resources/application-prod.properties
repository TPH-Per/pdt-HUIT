# Production Profile Configuration

# =============================================
# Environment Variable Database Connection
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/pdt_huit_db}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:changeme}

# =============================================
# Redis Configuration (Production)
# =============================================
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

# =============================================
# JWT Secret from Environment
# =============================================
jwt.secret=${JWT_SECRET:replace-with-256-bit-secret-at-least-32-chars!!}

# =============================================
# Hibernate Production Settings
# =============================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.root=WARN
logging.level.com.huit.pdt=INFO

# =============================================
# Actuator Restricted for Production
# =============================================
springdoc.swagger-ui.enabled=false
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/internal/actuator
management.endpoint.health.show-details=when-authorized
